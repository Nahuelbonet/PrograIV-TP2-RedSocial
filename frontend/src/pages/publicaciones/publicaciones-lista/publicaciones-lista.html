<!-- Formulario de creación (solo con sesión iniciada) -->
@if (usuarioActualId) {
  <app-publicacion-form (creada)="onCreada()" />
}

<!-- Barra de ordenamiento -->
<div class="toolbar">
  <span class="toolbar-label">Ordenar por:</span>
  <div class="orden-tabs">
    <button
      class="orden-tab"
      [class.active]="orden === 'fecha'"
      (click)="cambiarOrden('fecha')"
    >
      Más recientes
    </button>
    <button
      class="orden-tab"
      [class.active]="orden === 'likes'"
      (click)="cambiarOrden('likes')"
    >
      Más populares
    </button>
  </div>
</div>

@if (error) {
  <div class="error-banner">{{ error }}</div>
}

@if (loading) {
  <div class="empty">
    <p>Cargando publicaciones…</p>
  </div>
} @else if (publicaciones.length === 0) {
  <div class="empty">
    <div class="empty-icon">📭</div>
    <p>No hay publicaciones todavía.</p>
  </div>
} @else {
  @for (pub of publicaciones; track pub._id) {
    <app-publicacion-card
      [publicacion]="pub"
      [usuarioActualId]="usuarioActualId"
      (toggleLike)="onToggleLike($event)"
      (eliminar)="onEliminar($event)"
    />
  }

  <!-- Paginación -->
  <div class="paginacion">
    <button class="pag-btn" [disabled]="!hayAnterior" (click)="anterior()">
      ← Anterior
    </button>
    <span class="pag-info">Página {{ paginaActual }} de {{ totalPaginas }}</span>
    <button class="pag-btn" [disabled]="!haySiguiente" (click)="siguiente()">
      Siguiente →
    </button>
  </div>
}
