<article class="card">
  <div class="card-header">
    @if (publicacion.usuario.fotoPerfil) {
      <img
        [src]="publicacion.usuario.fotoPerfil"
        [alt]="nombreAutor"
        class="avatar-img"
      />
    } @else {
      <div class="avatar">{{ inicialAutor }}</div>
    }
    <div class="author-info">
      <p class="autor">{{ nombreAutor }}</p>
      <p class="fecha">{{ publicacion.createdAt | date: 'dd/MM/yyyy HH:mm' }}</p>
    </div>

    @if (esPropia) {
      <button class="delete-btn" title="Eliminar publicación" (click)="onEliminar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    }
  </div>

  <h3 class="titulo">
    <a [routerLink]="['/publicaciones', publicacion._id]" class="titulo-link">{{ publicacion.titulo }}</a>
  </h3>
  <p class="contenido">{{ publicacion.descripcion }}</p>

  @if (publicacion.imagen) {
    <img [src]="publicacion.imagen" [alt]="publicacion.titulo" class="post-img" />
  }

  <div class="card-actions">
    <button
      class="action-btn like-btn"
      [class.liked]="yaDioLike"
      [disabled]="!hayUsuario"
      [title]="hayUsuario ? '' : 'Iniciá sesión para dar me gusta'"
      (click)="onToggleLike()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" [attr.fill]="yaDioLike ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      {{ yaDioLike ? 'Te gusta' : 'Me gusta' }}
      <span class="like-count">{{ publicacion.likesCount }}</span>
    </button>
  </div>
</article>
