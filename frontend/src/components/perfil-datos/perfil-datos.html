<div class="datos-card">
  <div class="datos-header">
    <h3>Información de cuenta</h3>
  </div>

  <div class="dato-item">
    <span class="dato-label">
      <span class="dato-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </span>
      Correo
    </span>
    <span class="dato-value">{{ usuario.correo }}</span>
  </div>

  <div class="dato-item">
    <span class="dato-label">
      <span class="dato-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </span>
      Fecha de nacimiento
    </span>
    <span class="dato-value">{{ formatFecha(usuario.fechaNacimiento) }}</span>
  </div>

  <div class="dato-item">
    <span class="dato-label">
      <span class="dato-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      </span>
      Miembro desde
    </span>
    <span class="dato-value">{{ formatFecha(usuario.createdAt) }}</span>
  </div>
</div>
