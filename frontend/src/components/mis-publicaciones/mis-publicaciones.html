<div class="mis-pub-card">
  <div class="seccion-header">
    <h3>Mis últimas publicaciones</h3>
  </div>

  @if (error) {
    <div class="error-banner">{{ error }}</div>
  }

  @if (loading) {
    <p class="estado">Cargando…</p>
  } @else if (publicaciones.length === 0) {
    <p class="estado">Todavía no realizaste ninguna publicación.</p>
  } @else {
    <div class="mini-lista">
      @for (pub of publicaciones; track pub._id) {
        <app-publicacion-card variante="mini" [publicacion]="pub" />
      }
    </div>
  }
</div>
