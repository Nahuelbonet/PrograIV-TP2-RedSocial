<div class="modal-overlay">
  <div class="modal">
    <div class="modal-icon">⏰</div>
    <h3>Tu sesión está por vencer</h3>
    <p>Quedan <strong>5 minutos</strong> de sesión. ¿Querés extenderla?</p>
    <div class="modal-actions">
      <app-boton variante="modal-secundario" (clic)="cerrar.emit()">Cerrar sesión</app-boton>
      <app-boton variante="modal-primario" (clic)="extender.emit()">Extender sesión</app-boton>
    </div>
  </div>
</div>
