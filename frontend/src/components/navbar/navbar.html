<nav class="navbar">
  <div class="navbar-inner">
    <a class="brand" routerLink="/publicaciones">
      <span class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="20" height="20">
          <line x1="16" y1="10" x2="8" y2="22" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
          <line x1="16" y1="10" x2="24" y2="22" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
          <line x1="8" y1="22" x2="24" y2="22" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
          <circle cx="16" cy="8" r="3" fill="white"/>
          <circle cx="7" cy="23" r="3" fill="white"/>
          <circle cx="25" cy="23" r="3" fill="white"/>
        </svg>
      </span>
      <span class="brand-name">Conecta</span>
    </a>
    <div class="nav-links">
      @if (auth.estaLogueado()) {
        @if (sesionInfo$ | async; as sesion) {
          @if (sesion.visible) {
            <span
              class="token-timer"
              [class.urgente]="sesion.urgente"
              title="Tiempo de sesión restante"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              {{ sesion.texto }}
            </span>
          }
        }
        <a routerLink="/publicaciones" routerLinkActive="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          Publicaciones
        </a>
        <a routerLink="/mi-perfil" routerLinkActive="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Mi Perfil
        </a>
        <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Iniciar sesión</a>
        <a routerLink="/registro" routerLinkActive="active" class="btn-register">Registrarse</a>
      }
    </div>
  </div>
</nav>
