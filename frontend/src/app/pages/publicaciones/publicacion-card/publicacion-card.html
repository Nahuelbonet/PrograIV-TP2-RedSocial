<article class="card">
  <div class="card-header">
    <div class="avatar" [style.background]="avatarColor">
      {{ publicacion.autor.charAt(0).toUpperCase() }}
    </div>
    <div class="author-info">
      <p class="autor">{{ publicacion.autor }}</p>
      <p class="fecha">{{ publicacion.fecha }}</p>
    </div>
  </div>
  <p class="contenido">{{ publicacion.contenido }}</p>
  <div class="card-actions">
    <button class="action-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Me gusta
    </button>
    <button class="action-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Comentar
    </button>
  </div>
</article>
